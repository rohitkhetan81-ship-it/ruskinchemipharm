<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer Hexagon in Ruskin Gold -->
  <path 
    d="M 50,4 L 90,27 V 73 L 50,96 L 10,73 V 27 Z" 
    stroke="#C5A059" 
    stroke-width="9" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />
  
  <!-- Stylized R and C Inner Marks -->
  <!-- Vertical stem of R -->
  <path 
    d="M 30,23 V 71" 
    stroke="#C5A059" 
    stroke-width="8.5" 
    stroke-linecap="round" 
  />
  
  <!-- Outer loop of R -->
  <path 
    d="M 30,23 H 57 C 66,23 70,27.5 70,36 C 70,44.5 66,49 H 30" 
    stroke="#C5A059" 
    stroke-width="8.5" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
  
  <!-- Kick-leg of R -->
  <path 
    d="M 40,49 L 20,71 L 50,88.5" 
    stroke="#C5A059" 
    stroke-width="8.5" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
  
  <!-- Inner C nested inside R loop -->
  <path 
    d="M 55,42.5 A 5.5 5.5 0 1 1 55,30" 
    stroke="#C5A059" 
    stroke-width="6.5" 
    stroke-linecap="round" 
  />
</svg>
