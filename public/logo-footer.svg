<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 625 100" fill="none">
  <!-- Logo Icon on Left -->
  <g transform="translate(10, 10)">
    <!-- Outer Hexagon in Ruskin Gold -->
    <path 
      d="M 40,3 L 73,22 V 58 L 40,77 L 7,58 V 22 Z" 
      stroke="#C5A059" 
      stroke-width="7.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      fill="none"
    />
    
    <!-- Stylized R and C Inner Marks -->
    <!-- Vertical stem of R -->
    <path 
      d="M 23,19 V 57" 
      stroke="#C5A059" 
      stroke-width="7" 
      stroke-linecap="round" 
    />
    
    <!-- Outer loop of R -->
    <path 
      d="M 23,19 H 45 C 52.5,19 56,23 56,30 C 56,37 52.5,41 45,41 H 23" 
      stroke="#C5A059" 
      stroke-width="7" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- Kick-leg of R -->
    <path 
      d="M 32,41 L 15,58 L 40,72.5" 
      stroke="#C5A059" 
      stroke-width="7" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- Inner C nested inside R loop -->
    <path 
      d="M 44,35 A 4.5 4.5 0 1 1 44,25" 
      stroke="#C5A059" 
      stroke-width="5.5" 
      stroke-linecap="round" 
    />
  </g>

  <!-- Typography on Right -->
  <!-- Brand Main Title: RUSKIN in White, CHEMIPHARM in Ruskin Gold -->
  <text 
    x="105" 
    y="46" 
    font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif" 
    font-weight="900" 
    font-size="34" 
    letter-spacing="1.5" 
    fill="#FFFFFF"
  >RUSKIN <tspan fill="#C5A059">CHEMIPHARM</tspan></text>
  
  <!-- Premium Accent Divider Line -->
  <line 
    x1="105" 
    y1="57" 
    x2="615" 
    y2="57" 
    stroke="#C5A059" 
    stroke-width="2.5" 
    stroke-linecap="round"
  />
  
  <!-- Brand Tagline matching exact requested text -->
  <text 
    x="105" 
    y="78" 
    font-family="'Inter', system-ui, -apple-system, sans-serif" 
    font-weight="800" 
    font-size="11" 
    letter-spacing="0.14em" 
    fill="#FFFFFF"
    opacity="0.9"
  >GLOBAL PARTNER FOR HUMAN &amp; VETERINARY HEALTHCARE SOLUTIONS</text>
</svg>
